<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ACTR</title>
    <link rel="stylesheet" href="/static/theme.css">
    <style>
        :root {
            --gradient: var(--primary-gradient);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 40px 48px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .logo {
            font-weight: 800;
            font-size: 2rem;
            color: var(--orange);
            text-align: center;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 6px;
            color: #555;
        }
        input[type=text], input[type=password] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.15s;
        }
        input:focus {
            outline: none;
            border-color: var(--orange);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .btn-login:hover {
            opacity: 0.9;
        }
        .error-msg {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">ACTR</div>
        <div class="subtitle">Admin access</div>

        <div id="error-msg" class="error-msg"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login">Sign in</button>
        </form>
    </div>

    <script>
        const VALID_USERNAME = 'ACTR2026';
        const VALID_PASSWORD = 'ACTR2026';

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-msg');

            if (username === VALID_USERNAME && password === VALID_PASSWORD) {
                document.cookie = 'actr_auth=authenticated; path=/; max-age=86400; SameSite=Lax';
                sessionStorage.setItem('actr_auth', 'authenticated');
                const redirect = new URLSearchParams(window.location.search).get('redirect') || '/';
                window.location.href = redirect;
            } else {
                errorEl.textContent = 'Invalid username or password.';
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
