<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Study Chat</title>
    <link rel="stylesheet" href="/static/theme.css">
    <style>
        html, body { height: 100%; width: 100%; overflow: hidden; }
        .app-wrapper { display: flex; flex-direction: column; height: 100vh; }
        .header {
            height: var(--header-height);
            background: var(--primary-gradient);
            color: white;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: var(--shadow-md);
            flex-shrink: 0;
        }
        .header h2 { font-size: 1.05rem; font-weight: 700; }
        .info { font-size: 0.78rem; opacity: 0.9; margin-top: 4px; }
        .chat-container {
            flex: 1; overflow: hidden; display: flex; flex-direction: column;
            width: 100%; max-width: 720px; margin: 0 auto;
        }
        #chat-box {
            flex: 1; overflow-y: auto; padding: 16px 18px;
            display: flex; flex-direction: column; gap: 10px;
            -webkit-overflow-scrolling: touch;
        }
        .message-group {
            display: flex; align-items: flex-end; gap: 8px;
            max-width: 85%; animation: fadeIn 0.2s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-group.own { align-self: flex-end; flex-direction: row-reverse; }
        .message-group.other { align-self: flex-start; }
        .message-content { display: flex; flex-direction: column; }
        .message-group.own .message-content { align-items: flex-end; }
        .message-sender {
            font-size: 0.7rem; color: var(--gray-700);
            font-weight: 600; margin-bottom: 2px; padding: 0 4px;
        }
        .sender-bot { color: var(--orange-dark); }
        .message {
            padding: 10px 14px; border-radius: 16px;
            font-size: 0.94rem; line-height: 1.4;
            box-shadow: var(--shadow-sm);
        }
        .message.own {
            background: var(--own-msg); color: white;
            border-bottom-right-radius: 4px;
        }
        .message.other {
            background: var(--other-msg); color: var(--gray-900);
            border: 1px solid var(--gray-300);
            border-bottom-left-radius: 4px;
        }
        .input-area {
            background: var(--white);
            padding: 10px 16px 12px;
            border-top: 1px solid var(--gray-300);
            flex-shrink: 0;
        }
        #mention-bar {
            display: flex; gap: 6px; margin-bottom: 8px;
            overflow-x: auto; padding-bottom: 4px;
        }
        .mention-btn {
            background: var(--gray-100); border: 1px solid var(--gray-300);
            padding: 4px 12px; border-radius: 14px;
            font-size: 0.72rem; cursor: pointer;
            white-space: nowrap; color: var(--orange-dark); font-weight: 600;
        }
        .mention-btn:hover { background: var(--orange-pale); }
        .input-row {
            display: flex; gap: 10px; max-width: 720px;
            width: 100%; margin: 0 auto; align-items: center;
        }
        #msg-input {
            flex: 1; padding: 11px 16px;
            border: 1px solid var(--gray-300); border-radius: 22px;
            font-size: 0.95rem; outline: none; background: var(--gray-100);
        }
        #msg-input:focus { border-color: var(--orange); background: var(--white); }
        button.send-btn {
            background: var(--primary-gradient); color: white; border: none;
            width: 42px; height: 42px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; flex-shrink: 0;
        }
        button.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            display: inline-block; margin-right: 5px; background: var(--gray-500);
        }
        .loading {
            display: flex; justify-content: center; align-items: center;
            height: 100%; font-size: 0.95rem; color: var(--gray-700);
        }
        .system-banner {
            text-align: center; padding: 10px 14px; margin: 8px 0;
            background: var(--orange-pale); color: var(--orange-dark);
            border-radius: 8px; font-size: 0.85rem; font-weight: 600;
        }
        .ws-footer {
            text-align: center; font-size: 0.62rem;
            color: var(--gray-500); margin-top: 4px;
        }
        #turn-banner {
            display: none;
            text-align: center;
            padding: 8px 12px;
            background: var(--white);
            border-bottom: 1px solid var(--gray-300);
            font-size: 0.82rem;
            color: var(--gray-700);
        }
        #turn-banner.active { display: block; }
        #turn-banner.your-turn { background: var(--orange-pale); color: var(--orange-dark); font-weight: 600; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="header">
        <h2 id="room-title">Study Chat</h2>
        <div class="info">
            <span id="status-dot" class="status-dot"></span>
            <span id="ws-status">Connecting...</span>
        </div>
    </div>

    <div id="turn-banner"></div>
    <div class="chat-container">
        <div id="chat-box" class="loading">Initializing...</div>
    </div>

    <div class="input-area" id="input-area" style="display: none;">
        <div id="mention-bar"></div>
        <div class="input-row">
            <input id="msg-input" type="text" placeholder="Type your message..." autocomplete="off" disabled>
            <button class="send-btn" id="send-button" disabled title="Send">➤</button>
        </div>
        <div class="ws-footer"><span id="ws-status-detail"></span></div>
    </div>
</div>

<script>
    /*
     * Qualtrics embed — pass embedded data as URL params:
     *   session_id     → ${e://Field/session_id}
     *   participant_id → ${e://Field/ResponseID} or custom embedded field
     *   group_id       → optional fixed group (omit for auto-match queue)
     */
    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('session_id') || urlParams.get('session');
    const participantId = urlParams.get('participant_id') || urlParams.get('pid');
    const condition = urlParams.get('condition') || urlParams.get('cond') || '';
    let groupId = urlParams.get('group_id') || null;

    let sessionConfig = {};
    const chatBox = document.getElementById('chat-box');
    const turnBanner = document.getElementById('turn-banner');
    const msgInput = document.getElementById('msg-input');
    const wsStatus = document.getElementById('ws-status');
    const wsStatusDetail = document.getElementById('ws-status-detail');
    const statusDot = document.getElementById('status-dot');
    const mentionBar = document.getElementById('mention-bar');
    const sendButton = document.getElementById('send-button');
    const inputArea = document.getElementById('input-area');

    let activeBots = [];
    let myDisplayName = null;

    function showError(msg) {
        chatBox.className = '';
        chatBox.innerHTML = `<div style="color:var(--danger);text-align:center;padding:24px;"><p>${msg}</p></div>`;
    }

    function setConnected(online) {
        wsStatus.textContent = online ? 'Connected' : 'Disconnected';
        wsStatusDetail.textContent = online ? 'You can send messages' : 'Please refresh if disconnected';
        statusDot.style.background = online ? 'var(--success)' : 'var(--danger)';
        msgInput.disabled = !online || !myDisplayName;
        sendButton.disabled = !online || !myDisplayName;
    }

    if (!sessionId || !participantId) {
        showError('Missing session_id or participant_id.<br>Use: ?session_id=SES-XXXX&participant_id=${e://Field/ResponseID}');
        throw new Error('Missing required parameters');
    }

    function scrollToBottom() { chatBox.scrollTop = chatBox.scrollHeight; }

    function renderMessage(sender, text) {
        const botMatch = activeBots.find(b => b.name === sender);
        const isBot = !!botMatch;
        const isOwn = myDisplayName && sender === myDisplayName;
        const showAsBot = isBot && (!botMatch.avatar_type || botMatch.avatar_type === 'bot');

        const group = document.createElement('div');
        group.className = `message-group ${isOwn ? 'own' : 'other'}`;

        const content = document.createElement('div');
        content.className = 'message-content';

        const senderEl = document.createElement('div');
        senderEl.className = `message-sender${showAsBot ? ' sender-bot' : ''}`;
        senderEl.textContent = isOwn ? `${sender} (you)` : sender;

        const bubble = document.createElement('div');
        bubble.className = `message ${isOwn ? 'own' : 'other'}`;
        bubble.textContent = text;

        content.appendChild(senderEl);
        content.appendChild(bubble);
        group.appendChild(content);
        chatBox.appendChild(group);
        scrollToBottom();
    }

    function showWelcomeBanner(name) {
        const el = document.createElement('div');
        el.className = 'system-banner';
        el.textContent = `You are chatting as ${name}. You may begin when ready.`;
        chatBox.appendChild(el);
        scrollToBottom();
    }

    function updateTurnBanner(payload) {
        if (!payload || payload.turn_mode === 'none') {
            turnBanner.className = '';
            turnBanner.style.display = 'none';
            return;
        }
        turnBanner.style.display = 'block';
        const mine = payload.can_speak;
        turnBanner.className = 'active' + (mine ? ' your-turn' : '');
        let text = mine ? "It's your turn — you may speak." : `Waiting for ${payload.current_speaker || 'another participant'}...`;
        if (payload.turn_mode === 'timed' && payload.seconds_remaining != null) {
            text += ` (${payload.seconds_remaining}s)`;
        }
        turnBanner.textContent = text;
        msgInput.disabled = !mine || !window.chatWebSocket || window.chatWebSocket.readyState !== WebSocket.OPEN;
        sendButton.disabled = msgInput.disabled;
    }

    function notifyQualtricsParent(payload) {
        if (!sessionConfig.qualtrics_handoff_enabled && !payload.qualtrics_handoff) return;
        const msg = {
            source: 'ACTR_CHAT',
            event: 'chat_ended',
            session_id: sessionId,
            participant_id: participantId,
            group_id: groupId,
            reason: payload.reason || 'ended',
            auto_advance: !!(sessionConfig.qualtrics_handoff_enabled || payload.qualtrics_handoff),
            qualtrics_field_transcript: payload.qualtrics_field_transcript || sessionConfig.qualtrics_field_transcript || 'chat_transcript',
            qualtrics_field_status: payload.qualtrics_field_status || sessionConfig.qualtrics_field_status || 'chat_status',
            transcript_text: payload.transcript_text || '',
            transcript_json: payload.transcript_json || '[]',
        };
        try {
            window.parent.postMessage(msg, '*');
        } catch (e) {
            console.warn('postMessage failed', e);
        }
    }

    async function onSessionEnded(payload) {
        setConnected(false);
        if (sessionConfig.qualtrics_store_chat && !payload.transcript_text) {
            try {
                const r = await fetch(`/api/export/participant/${encodeURIComponent(sessionId)}/${encodeURIComponent(participantId)}`);
                if (r.ok) {
                    const ex = await r.json();
                    payload.transcript_text = ex.transcript_text;
                    payload.transcript_json = JSON.stringify(ex.messages || []);
                }
            } catch (e) { console.warn('Export pull failed', e); }
        }
        notifyQualtricsParent(payload);
        showError(payload.message || 'Session ended.');
    }

    async function loadConfig() {
        try {
            const res = await fetch(`/api/sessions/${encodeURIComponent(sessionId)}/config`);
            if (!res.ok) return;
            sessionConfig = await res.json();
            activeBots = (sessionConfig.bots || []).filter(b => b.name);

            mentionBar.innerHTML = '';
            activeBots.forEach(bot => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'mention-btn';
                btn.textContent = `@${bot.name}`;
                btn.onclick = () => {
                    msgInput.value = `@${bot.name} ` + msgInput.value;
                    msgInput.focus();
                };
                mentionBar.appendChild(btn);
            });
        } catch (e) {
            console.error('Config load error:', e);
        }
    }

    async function waitForGroup() {
        const existing = await fetch(
            `/api/embed/status?session_id=${encodeURIComponent(sessionId)}&participant_id=${encodeURIComponent(participantId)}`
        ).then(r => r.json()).catch(() => ({}));
        if (existing.status === 'matched' && existing.group_id) {
            return existing.group_id;
        }

        return new Promise((resolve, reject) => {
            const poll = setInterval(async () => {
                try {
                    let matchUrl = `/api/match?session_id=${encodeURIComponent(sessionId)}&uid=${encodeURIComponent(participantId)}`;
                    if (condition) matchUrl += `&condition=${encodeURIComponent(condition)}`;
                    const res = await fetch(matchUrl);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    if (data.status === 'matched') {
                        clearInterval(poll);
                        resolve(data.group_id);
                    }
                } catch (e) {
                    clearInterval(poll);
                    reject(e);
                }
            }, 2500);
        });
    }

    function connectWebSocket(gid) {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws/chat/${encodeURIComponent(sessionId)}/${encodeURIComponent(gid)}/${encodeURIComponent(participantId)}`;
        const ws = new WebSocket(wsUrl);

        ws.onopen = () => setConnected(true);

        ws.onmessage = (event) => {
            let payload;
            try { payload = JSON.parse(event.data); } catch { return; }

            if (!payload || !payload.type) return;

            if (payload.type === 'display_name') {
                myDisplayName = payload.name;
                setConnected(true);
                showWelcomeBanner(myDisplayName);
                return;
            }
            if (payload.type === 'session_ended') {
                onSessionEnded(payload);
                return;
            }
            if (payload.type === 'turn_update') {
                updateTurnBanner(payload);
                return;
            }
            if (payload.type === 'turn_denied') {
                const el = document.createElement('div');
                el.className = 'system-banner';
                el.textContent = payload.message || 'Not your turn.';
                chatBox.appendChild(el);
                scrollToBottom();
                return;
            }
            if (payload.type === 'message') {
                renderMessage(payload.sender, payload.text);
            }
        };

        ws.onclose = () => setConnected(false);
        window.chatWebSocket = ws;
    }

    function sendMessage() {
        const val = msgInput.value.trim();
        if (!val || !myDisplayName || !window.chatWebSocket || window.chatWebSocket.readyState !== WebSocket.OPEN) return;
        window.chatWebSocket.send(val);
        renderMessage(myDisplayName, val);
        msgInput.value = '';
        msgInput.focus();
    }

    sendButton.addEventListener('click', sendMessage);
    msgInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
    });

    (async () => {
        try {
            chatBox.innerHTML = '<div class="loading">Connecting to your session...</div>';

            if (!groupId) {
                chatBox.innerHTML = '<div class="loading">Finding your chat group...</div>';
                groupId = await waitForGroup();
            }

            chatBox.className = '';
            chatBox.innerHTML = '';
            inputArea.style.display = 'block';
            document.getElementById('room-title').textContent = 'Team Discussion';

            await loadConfig();
            connectWebSocket(groupId);
        } catch (err) {
            showError('Could not start chat: ' + err.message);
        }
    })();
</script>
</body>
</html>
