<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Study Chat</title>
    <link rel="stylesheet" href="/static/theme.css">
    <style>
        :root { --header-height: 72px; }
        html, body { height: 100%; width: 100%; overflow: hidden; font-family: var(--font-chat); }
        body, input, textarea, button { font-family: var(--font-chat); }
        .app-wrapper { display: flex; flex-direction: column; height: 100vh; }
        .header {
            height: var(--header-height);
            background: var(--primary-gradient);
            color: white;
            padding: 10px 20px 8px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            box-shadow: var(--shadow-md);
            flex-shrink: 0;
        }
        .header h2 { font-size: 1.05rem; font-weight: 700; }
        .team-roster {
            font-size: 0.82rem; font-weight: 500; margin-top: 6px;
            opacity: 0.95; line-height: 1.3;
        }
        .team-roster .you { font-weight: 500; text-decoration: underline; text-underline-offset: 2px; }
        .team-roster .ai-label { font-weight: 500; opacity: 0.92; font-size: 0.78rem; }
        .info { font-size: 0.78rem; opacity: 0.9; margin-top: 2px; }
        .chat-container {
            flex: 1; overflow: hidden; display: flex; flex-direction: column;
            width: 100%; max-width: 720px; margin: 0 auto;
        }
        #chat-box {
            flex: 1; overflow-y: auto; padding: 16px 18px;
            display: flex; flex-direction: column; gap: 10px;
            -webkit-overflow-scrolling: touch;
        }
        .message-group {
            display: flex; align-items: flex-start; gap: 10px;
            max-width: 88%; animation: fadeIn 0.2s ease-out;
        }
        .msg-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            flex-shrink: 0; display: flex; align-items: center; justify-content: center;
            font-size: 1.15rem; line-height: 1;
            background: #eef2ff; border: 1.5px solid #c7d2fe;
            box-shadow: var(--shadow-sm);
        }
        .msg-avatar.human { background: #eef2ff; border-color: #a5b4fc; }
        .msg-avatar.bot { background: #fff7ed; border-color: #fdba74; }
        .message-group.own .msg-avatar.human { background: #fff7ed; border-color: #fdba74; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-group.own { align-self: flex-end; flex-direction: row-reverse; }
        .message-group.other { align-self: flex-start; }
        .message-content { display: flex; flex-direction: column; }
        .message-group.own .message-content { align-items: flex-end; }
        .message-sender {
            font-size: 0.7rem; color: var(--gray-700);
            font-weight: 600; margin-bottom: 2px; padding: 0 4px;
        }
        .sender-bot { color: var(--orange-dark); }
        .message-body {
            font-size: 0.94rem;
            line-height: 1.45;
            color: var(--gray-900);
            word-break: break-word;
            padding: 0 2px;
        }
        .message-group.own .message-body { text-align: right; }
        .input-area {
            background: var(--white);
            padding: 10px 16px 12px;
            border-top: 1px solid var(--gray-300);
            flex-shrink: 0;
        }
        #mention-bar {
            display: flex; gap: 6px; margin-bottom: 8px;
            overflow-x: auto; padding-bottom: 4px;
        }
        .mention-btn {
            background: var(--gray-100); border: 1px solid var(--gray-300);
            padding: 4px 12px; border-radius: 14px;
            font-size: 0.72rem; cursor: pointer;
            white-space: nowrap; color: var(--orange-dark); font-weight: 600;
        }
        .mention-btn:hover { background: var(--orange-pale); }
        .input-row {
            display: flex; gap: 10px; max-width: 720px;
            width: 100%; margin: 0 auto; align-items: center;
        }
        #msg-input {
            flex: 1; padding: 11px 16px;
            border: 1px solid var(--gray-300); border-radius: 22px;
            font-size: 0.95rem; outline: none; background: var(--gray-100);
        }
        #msg-input:focus { border-color: var(--orange); background: var(--white); }
        button.send-btn {
            background: var(--primary-gradient); color: white; border: none;
            width: 42px; height: 42px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; flex-shrink: 0;
        }
        button.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            display: inline-block; margin-right: 5px; background: var(--gray-500);
        }
        .loading {
            display: flex; justify-content: center; align-items: center;
            height: 100%; font-size: 0.95rem; color: var(--gray-700);
        }
        .system-banner {
            text-align: center; padding: 10px 14px; margin: 8px 0;
            background: var(--orange-pale); color: var(--orange-dark);
            border-radius: 8px; font-size: 0.85rem; font-weight: 600;
        }
        .ws-footer {
            text-align: center; font-size: 0.62rem;
            color: var(--gray-500); margin-top: 4px;
        }
        #turn-banner {
            display: none;
            text-align: center;
            padding: 8px 12px;
            background: var(--white);
            border-bottom: 1px solid var(--gray-300);
            font-size: 0.82rem;
            color: var(--gray-700);
        }
        #turn-banner.active { display: block; }
        #turn-banner.your-turn { background: var(--orange-pale); color: var(--orange-dark); font-weight: 600; }
        #onboarding-overlay {
            position: fixed; inset: 0; z-index: 2000;
            background: var(--primary-gradient);
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
            transition: opacity 0.35s ease;
        }
        #onboarding-overlay.hidden {
            opacity: 0; pointer-events: none;
        }
        .onboarding-card {
            background: white; border-radius: 20px;
            padding: 36px 28px; max-width: 360px; width: 100%;
            text-align: center; box-shadow: 0 16px 48px rgba(0,0,0,0.18);
        }
        .onboarding-card h3 {
            font-size: 1.05rem; color: var(--gray-900);
            margin-bottom: 12px; font-weight: 500; line-height: 1.5;
        }
        .onboarding-card p.sub {
            font-size: 0.95rem; color: var(--gray-700); line-height: 1.5;
            font-weight: 400;
        }
        .onboarding-card p.sub-en {
            font-size: 0.95rem; color: var(--gray-700);
            margin-top: 8px; font-weight: 400;
        }
        .match-spinner {
            width: 44px; height: 44px; margin: 0 auto 20px;
            border: 4px solid var(--gray-300);
            border-top-color: var(--orange);
            border-radius: 50%;
            animation: spin 0.85s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes onboardingPop {
            0% { opacity: 0; transform: scale(0.88) translateY(12px); }
            55% { opacity: 1; transform: scale(1.04) translateY(-4px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .onboarding-card.pop {
            animation: onboardingPop 0.55s cubic-bezier(0.34, 1.4, 0.64, 1);
        }
        .main-chat-hidden .chat-container,
        .main-chat-hidden .input-area,
        .main-chat-hidden #turn-banner {
            visibility: hidden;
        }
    </style>
</head>
<body class="font-chat">

<div class="app-wrapper main-chat-hidden" id="app-wrapper">
    <div id="onboarding-overlay" aria-live="polite">
        <div class="onboarding-card" id="onboarding-card">
            <div class="match-spinner" id="onboarding-spinner"></div>
            <h3 id="onboarding-title">Matching you to a group…</h3>
            <p class="sub" id="onboarding-sub">Please wait a moment.</p>
            <p class="sub-en" id="onboarding-sub-en" style="display:none;"></p>
        </div>
    </div>
    <div class="header">
        <h2 id="room-title">Study Chat</h2>
        <div id="team-roster" class="team-roster">Loading group…</div>
        <div class="info">
            <span id="status-dot" class="status-dot"></span>
            <span id="ws-status">Connecting...</span>
        </div>
    </div>

    <div id="turn-banner"></div>
    <div class="chat-container">
        <div id="chat-box" class="loading">Initializing...</div>
    </div>

    <div class="input-area" id="input-area" style="display: none;">
        <div id="mention-bar"></div>
        <div class="input-row">
            <input id="msg-input" type="text" placeholder="Type your message..." autocomplete="off" disabled>
            <button class="send-btn" id="send-button" disabled title="Send">➤</button>
        </div>
        <div class="ws-footer"><span id="ws-status-detail"></span></div>
    </div>
</div>

<script>
    /*
     * Qualtrics embed — pass embedded data as URL params:
     *   session_id     → ${e://Field/session_id}
     *   participant_id → ${e://Field/ResponseID} or custom embedded field
     *   group_id       → optional fixed group (omit for auto-match queue)
     */
    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('session_id') || urlParams.get('session');
    const participantId = urlParams.get('participant_id') || urlParams.get('pid');
    const condition = urlParams.get('condition') || urlParams.get('cond') || '';
    let groupId = urlParams.get('group_id') || null;

    let sessionConfig = {};
    const chatBox = document.getElementById('chat-box');
    const turnBanner = document.getElementById('turn-banner');
    const msgInput = document.getElementById('msg-input');
    const wsStatus = document.getElementById('ws-status');
    const wsStatusDetail = document.getElementById('ws-status-detail');
    const statusDot = document.getElementById('status-dot');
    const mentionBar = document.getElementById('mention-bar');
    const sendButton = document.getElementById('send-button');
    const inputArea = document.getElementById('input-area');
    const teamRoster = document.getElementById('team-roster');

    let activeBots = [];
    let myDisplayName = null;
    let qualtricsHandoffSent = false;
    let sessionEndedNormally = false;
    let handoffInFlight = false;
    let hadConnectedChat = false;
    let chatUiRevealed = false;
    const pendingChatMessages = [];

    const onboardingOverlay = document.getElementById('onboarding-overlay');
    const onboardingCard = document.getElementById('onboarding-card');
    const onboardingSpinner = document.getElementById('onboarding-spinner');
    const onboardingTitle = document.getElementById('onboarding-title');
    const onboardingSub = document.getElementById('onboarding-sub');
    const onboardingSubEn = document.getElementById('onboarding-sub-en');
    const appWrapper = document.getElementById('app-wrapper');

    function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function showMatchingOnboarding() {
        onboardingOverlay.classList.remove('hidden');
        onboardingSpinner.style.display = 'block';
        onboardingTitle.textContent = 'Matching you to a group…';
        onboardingSub.textContent = 'Please wait a moment.';
        onboardingSub.style.display = 'block';
        onboardingSubEn.style.display = 'none';
        onboardingCard.classList.remove('pop');
        wsStatus.textContent = 'Matching…';
        statusDot.style.background = 'var(--gray-500)';
        document.getElementById('room-title').textContent = 'Study Chat';
        teamRoster.textContent = 'Please wait…';
    }

    async function showAssignedOnboarding(displayName) {
        onboardingSpinner.style.display = 'none';
        onboardingTitle.textContent = `You are assigned as ${displayName}`;
        onboardingSub.textContent = 'Entering team chat…';
        onboardingSubEn.textContent = "Let's begin your chat!";
        onboardingSubEn.style.display = 'block';
        onboardingCard.classList.remove('pop');
        void onboardingCard.offsetWidth;
        onboardingCard.classList.add('pop');
        wsStatus.textContent = 'Ready';
        teamRoster.textContent = `You are ${displayName}`;
        await sleep(3000);
    }

    function revealMainChat(displayName) {
        chatUiRevealed = true;
        appWrapper.classList.remove('main-chat-hidden');
        onboardingOverlay.classList.add('hidden');
        inputArea.style.display = 'block';
        document.getElementById('room-title').textContent = 'Team Discussion';
        updateGroupRoster();
        pendingChatMessages.forEach((m) => renderMessage(m.sender, m.text));
        pendingChatMessages.length = 0;
        setConnected(window.chatWebSocket && window.chatWebSocket.readyState === WebSocket.OPEN);
    }

    function formatTeammateLabel(bot) {
        if (!bot || !bot.name) return '';
        if (bot.disclosed_ai_allowed) {
            return `${bot.name} <span class="ai-label">(may use AI)</span>`;
        }
        return bot.name;
    }

    function updateGroupRoster() {
        const parts = [];
        activeBots.forEach(bot => {
            const label = formatTeammateLabel(bot);
            if (label) parts.push(label);
        });
        if (myDisplayName) {
            const botNames = activeBots.map(b => b.name);
            if (botNames.includes(myDisplayName)) {
                parts.push(`<span class="you" title="Your display name overlaps a teammate name — contact the researcher">${myDisplayName} (you)</span>`);
            } else {
                parts.push(`<span class="you">${myDisplayName} (you)</span>`);
            }
        } else if (sessionConfig.group_size) {
            parts.push('<span style="opacity:0.85">you</span>');
        }
        const nHumans = sessionConfig.group_size || 1;
        const total = activeBots.length + nHumans;
        teamRoster.innerHTML = parts.length
            ? `Your team (${total}): ${parts.join(', ')}`
            : 'Your team: connecting…';
        if (sessionConfig.session_mode === 3) {
            teamRoster.innerHTML += '<br><span style="font-weight:500;font-size:0.72rem;opacity:0.9">Mention a name (e.g. @a) to address that teammate.</span>';
        }
    }

    function showError(msg) {
        chatBox.className = '';
        chatBox.innerHTML = `<div style="color:var(--danger);text-align:center;padding:24px;"><p>${msg}</p></div>`;
    }

    function setConnected(online) {
        if (!chatUiRevealed) return;
        wsStatus.textContent = online ? 'Connected' : 'Disconnected';
        wsStatusDetail.textContent = online ? 'You can send messages' : 'Please refresh if disconnected';
        statusDot.style.background = online ? 'var(--success)' : 'var(--danger)';
        msgInput.disabled = !online || !myDisplayName;
        sendButton.disabled = !online || !myDisplayName;
    }

    if (!sessionId || !participantId) {
        showError('Missing session_id or participant_id.<br>Use: ?session_id=SES-XXXX&participant_id=${e://Field/ResponseID}');
        throw new Error('Missing required parameters');
    }

    function scrollToBottom() { chatBox.scrollTop = chatBox.scrollHeight; }

    function avatarKindForSender(botMatch, isBot) {
        if (!isBot) return 'human';
        return botMatch && botMatch.avatar_type === 'human' ? 'human' : 'bot';
    }

    function createMessageAvatar(kind) {
        const av = document.createElement('div');
        av.className = `msg-avatar ${kind}`;
        av.setAttribute('aria-hidden', 'true');
        av.textContent = kind === 'bot' ? '🤖' : '👤';
        return av;
    }

    function renderMessage(sender, text) {
        const botMatch = activeBots.find(b => b.name === sender);
        const isBot = !!botMatch;
        const isOwn = myDisplayName && sender === myDisplayName && !isBot;
        const showAsBot = isBot && (!botMatch.avatar_type || botMatch.avatar_type === 'bot');
        const avatarKind = avatarKindForSender(botMatch, isBot);

        const group = document.createElement('div');
        group.className = `message-group ${isOwn ? 'own' : 'other'}`;

        const avatar = createMessageAvatar(avatarKind);

        const content = document.createElement('div');
        content.className = 'message-content';

        const senderEl = document.createElement('div');
        senderEl.className = `message-sender${showAsBot ? ' sender-bot' : ''}`;
        senderEl.textContent = isOwn ? `${sender} (you)` : sender;

        const body = document.createElement('div');
        body.className = 'message-body';
        body.textContent = text;

        content.appendChild(senderEl);
        content.appendChild(body);
        group.appendChild(avatar);
        group.appendChild(content);
        chatBox.appendChild(group);
        scrollToBottom();
    }

    function showWelcomeBanner(name) {
        const el = document.createElement('div');
        el.className = 'system-banner';
        el.textContent = `You are chatting as ${name}. You may begin when ready.`;
        chatBox.appendChild(el);
        scrollToBottom();
    }

    function updateTurnBanner(payload) {
        if (!payload || payload.turn_mode === 'none') {
            turnBanner.className = '';
            turnBanner.style.display = 'none';
            return;
        }
        turnBanner.style.display = 'block';
        const mine = payload.can_speak;
        turnBanner.className = 'active' + (mine ? ' your-turn' : '');
        let text = mine ? "It's your turn — you may speak." : `Waiting for ${payload.current_speaker || 'another participant'}...`;
        if (payload.turn_mode === 'timed' && payload.seconds_remaining != null) {
            text += ` (${payload.seconds_remaining}s)`;
        }
        turnBanner.textContent = text;
        msgInput.disabled = !mine || !window.chatWebSocket || window.chatWebSocket.readyState !== WebSocket.OPEN;
        sendButton.disabled = msgInput.disabled;
    }

    function notifyQualtricsParent(payload) {
        const qualtricsOn = !!(
            sessionConfig.qualtrics_handoff_enabled
            || sessionConfig.qualtrics_store_chat
            || payload.qualtrics_handoff
            || payload.qualtrics_store_chat
        );
        if (!qualtricsOn) return;

        const chatStatus = payload.chat_status || '';
        const autoAdvance = payload.auto_advance !== undefined
            ? !!payload.auto_advance
            : (qualtricsOn && chatStatus === 'completed_full');

        const msg = {
            source: 'ACTR_CHAT',
            event: 'chat_ended',
            session_id: sessionId,
            participant_id: participantId,
            group_id: groupId,
            reason: payload.reason || 'ended',
            auto_advance: autoAdvance,
            qualtrics_field_transcript: payload.qualtrics_field_transcript || sessionConfig.qualtrics_field_transcript || 'transcript',
            qualtrics_field_status: payload.qualtrics_field_status || sessionConfig.qualtrics_field_status || 'chat_status',
            chat_status: chatStatus,
            chat_status_detail: payload.chat_status_detail || '',
            transcript_text: payload.transcript_text || '',
            transcript_json: payload.transcript_json || '[]',
        };
        try {
            window.parent.postMessage(msg, '*');
            if (window.top && window.top !== window.parent) {
                window.top.postMessage(msg, '*');
            }
        } catch (e) {
            console.warn('postMessage failed', e);
        }
        console.log('[ACTR] chat_ended → parent', msg.chat_status, (msg.transcript_text || '').length, 'chars');
    }

    function flushQualtricsHandoffSync(reason) {
        if (qualtricsHandoffSent || sessionEndedNormally) return false;
        const qualtricsOn = !!(
            sessionConfig.qualtrics_handoff_enabled || sessionConfig.qualtrics_store_chat
        );
        if (!qualtricsOn || !sessionId || !participantId) return false;
        try {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/embed/handoff', false);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.send(JSON.stringify({
                session_id: sessionId,
                participant_id: participantId,
                reason: reason,
            }));
            if (xhr.status !== 200) return false;
            const data = JSON.parse(xhr.responseText);
            notifyQualtricsParent({
                ...data,
                reason,
                auto_advance: data.chat_status === 'completed_full' && qualtricsOn,
            });
            qualtricsHandoffSent = true;
            return true;
        } catch (e) {
            console.warn('Qualtrics sync handoff failed', e);
            return false;
        }
    }

    async function flushQualtricsHandoff(reason, options = {}) {
        if (qualtricsHandoffSent || sessionEndedNormally || handoffInFlight) return;
        if (options.sync) {
            flushQualtricsHandoffSync(reason);
            return;
        }
        handoffInFlight = true;
        const qualtricsOn = !!(
            sessionConfig.qualtrics_handoff_enabled || sessionConfig.qualtrics_store_chat
        );
        if (!qualtricsOn) return;

        try {
            const res = await fetch('/api/embed/handoff', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    session_id: sessionId,
                    participant_id: participantId,
                    reason: reason,
                }),
                keepalive: !!options.keepalive,
            });
            if (!res.ok) return;
            const data = await res.json();
            notifyQualtricsParent({
                ...data,
                reason: reason,
                auto_advance: data.chat_status === 'completed_full' && qualtricsOn,
            });
            qualtricsHandoffSent = true;
        } catch (e) {
            console.warn('Qualtrics handoff failed', e);
        } finally {
            handoffInFlight = false;
        }
    }

    async function onSessionEnded(payload) {
        sessionEndedNormally = true;
        setConnected(false);
        if (sessionConfig.qualtrics_store_chat && !payload.transcript_text) {
            try {
                const r = await fetch(`/api/export/participant/${encodeURIComponent(sessionId)}/${encodeURIComponent(participantId)}`);
                if (r.ok) {
                    const ex = await r.json();
                    payload.transcript_text = ex.transcript_text;
                    payload.transcript_json = JSON.stringify(ex.messages || []);
                    if (!payload.chat_status) payload.chat_status = ex.chat_status;
                    if (!payload.chat_status_detail) payload.chat_status_detail = ex.chat_status_detail;
                }
            } catch (e) { console.warn('Export pull failed', e); }
        }
        payload.auto_advance = !!(
            (sessionConfig.qualtrics_handoff_enabled || sessionConfig.qualtrics_store_chat)
            && (payload.chat_status === 'completed_full' || payload.reason === 'duration_limit')
        );
        notifyQualtricsParent(payload);
        qualtricsHandoffSent = true;
        showError(payload.message || 'Session ended.');
    }

    function usesEmbedCondition() {
        return sessionConfig == null || sessionConfig.condition_enabled !== false;
    }

    async function loadConfig() {
        try {
            let configUrl = `/api/sessions/${encodeURIComponent(sessionId)}/config?participant_id=${encodeURIComponent(participantId)}`;
            if (usesEmbedCondition() && condition) {
                configUrl += `&condition=${encodeURIComponent(condition)}`;
            }
            const res = await fetch(configUrl);
            if (!res.ok) return;
            sessionConfig = await res.json();
            activeBots = (sessionConfig.bots || []).filter(b => b.name);

            mentionBar.innerHTML = '';
            activeBots.forEach(bot => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'mention-btn';
                btn.textContent = `@${bot.name}`;
                btn.onclick = () => {
                    msgInput.value = `@${bot.name} ` + msgInput.value;
                    msgInput.focus();
                };
                mentionBar.appendChild(btn);
            });
            updateGroupRoster();
        } catch (e) {
            console.error('Config load error:', e);
        }
    }

    async function waitForGroup() {
        const existing = await fetch(
            `/api/embed/status?session_id=${encodeURIComponent(sessionId)}&participant_id=${encodeURIComponent(participantId)}`
        ).then(r => r.json()).catch(() => ({}));
        if (existing.status === 'matched' && existing.group_id) {
            return existing.group_id;
        }

        return new Promise((resolve, reject) => {
            const poll = setInterval(async () => {
                try {
                    let matchUrl = `/api/match?session_id=${encodeURIComponent(sessionId)}&uid=${encodeURIComponent(participantId)}`;
                    if (usesEmbedCondition() && condition) {
                        matchUrl += `&condition=${encodeURIComponent(condition)}`;
                    }
                    const res = await fetch(matchUrl);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    if (data.status === 'session_closed') {
                        clearInterval(poll);
                        reject(new Error(data.message || 'This study session is closed.'));
                        return;
                    }
                    if (data.status === 'matched') {
                        clearInterval(poll);
                        resolve(data.group_id);
                    }
                } catch (e) {
                    clearInterval(poll);
                    reject(e);
                }
            }, 2500);
        });
    }

    function connectWebSocket(gid) {
        return new Promise((resolve, reject) => {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/chat/${encodeURIComponent(sessionId)}/${encodeURIComponent(gid)}/${encodeURIComponent(participantId)}`;
            const ws = new WebSocket(wsUrl);
            let nameResolved = false;

            const failTimer = setTimeout(() => {
                if (!nameResolved) reject(new Error('Connection timed out'));
            }, 45000);

            ws.onopen = () => {
                hadConnectedChat = true;
            };

            ws.onmessage = (event) => {
            let payload;
            try { payload = JSON.parse(event.data); } catch { return; }

            if (!payload || !payload.type) return;

            if (payload.type === 'display_name') {
                myDisplayName = payload.name;
                if (!nameResolved) {
                    nameResolved = true;
                    clearTimeout(failTimer);
                    resolve(myDisplayName);
                }
                if (chatUiRevealed) {
                    updateGroupRoster();
                    setConnected(true);
                }
                return;
            }
            if (payload.type === 'session_ended') {
                onSessionEnded(payload);
                return;
            }
            if (payload.type === 'turn_update') {
                updateTurnBanner(payload);
                return;
            }
            if (payload.type === 'turn_denied') {
                const el = document.createElement('div');
                el.className = 'system-banner';
                el.textContent = payload.message || 'Not your turn.';
                chatBox.appendChild(el);
                scrollToBottom();
                return;
            }
            if (payload.type === 'message') {
                if (chatUiRevealed) {
                    renderMessage(payload.sender, payload.text);
                } else {
                    pendingChatMessages.push({ sender: payload.sender, text: payload.text });
                }
                return;
            }
            };

            ws.onerror = () => {
                if (!nameResolved) {
                    clearTimeout(failTimer);
                    reject(new Error('WebSocket error'));
                }
            };

            ws.onclose = () => {
                setConnected(false);
                if (!nameResolved) {
                    clearTimeout(failTimer);
                    reject(new Error('Disconnected before assignment'));
                }
                if (!sessionEndedNormally && !qualtricsHandoffSent && hadConnectedChat) {
                    flushQualtricsHandoffSync('ws_close') || flushQualtricsHandoff('ws_close', { keepalive: true });
                }
            };
            window.chatWebSocket = ws;
        });
    }

    window.addEventListener('pagehide', () => {
        if (!sessionEndedNormally && !qualtricsHandoffSent && hadConnectedChat) {
            if (!flushQualtricsHandoffSync('page_unload')) {
                flushQualtricsHandoff('page_unload', { keepalive: true });
            }
        }
    });

    function sendMessage() {
        const val = msgInput.value.trim();
        if (!val || !myDisplayName || !window.chatWebSocket || window.chatWebSocket.readyState !== WebSocket.OPEN) return;
        window.chatWebSocket.send(val);
        renderMessage(myDisplayName, val);
        msgInput.value = '';
        msgInput.focus();
    }

    sendButton.addEventListener('click', sendMessage);
    msgInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
    });

    (async () => {
        try {
            showMatchingOnboarding();
            chatBox.innerHTML = '';

            const matchStarted = Date.now();
            if (!groupId) {
                groupId = await waitForGroup();
            }
            const matchWait = Math.max(0, 1200 - (Date.now() - matchStarted));
            if (matchWait > 0) await sleep(matchWait);

            await loadConfig();

            const displayName = await connectWebSocket(groupId);
            await showAssignedOnboarding(displayName);

            chatBox.className = '';
            revealMainChat(displayName);

            setTimeout(() => loadConfig().then(() => updateGroupRoster()), 400);
        } catch (err) {
            onboardingOverlay.classList.add('hidden');
            appWrapper.classList.remove('main-chat-hidden');
            showError('Could not start chat: ' + err.message);
        }
    })();
</script>
</body>
</html>
