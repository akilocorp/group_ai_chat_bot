<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dashboard — ACTR</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/theme.css">
    <style>
        .page-wrap {
            max-width: 1060px;
            margin: 0 auto;
            --fs-lg: 1.35rem;
            --fs-md: 1rem;
            --fs-sm: 0.8125rem;
        }
        .text-lg { font-size: var(--fs-lg); font-weight: 700; line-height: 1.25; }
        .text-md { font-size: var(--fs-md); font-weight: 600; line-height: 1.45; }
        .text-sm { font-size: var(--fs-sm); font-weight: 500; line-height: 1.45; color: var(--gray-700); }
        .text-muted { color: var(--gray-500); }
        .label-caps {
            font-size: var(--fs-sm);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--gray-500);
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .main-content {
            padding: 0 20px 40px;
            margin-top: calc(var(--header-height) + 14px);
            flex: 1;
        }

        .page-hero { margin-bottom: 20px; }

        .metrics {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }
        .metric {
            flex: 1;
            min-width: 110px;
            background: var(--white);
            border-radius: 12px;
            padding: 16px 18px;
            border: 1px solid rgba(0, 0, 0, 0.06);
        }
        .metric label {
            display: block;
            font-size: var(--fs-sm);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--gray-500);
            margin-bottom: 6px;
        }
        .metric span {
            font-size: var(--fs-lg);
            font-weight: 700;
            color: var(--gray-900);
            line-height: 1.2;
        }

        .card {
            background: white;
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border: 1px solid var(--gray-300);
            font-size: var(--fs-md);
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 22px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 11px 28px;
            background: var(--gray-100);
            border: 2px solid var(--gray-300);
            color: var(--gray-700);
            cursor: pointer;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.95rem;
            font-family: inherit;
            transition: 0.15s;
        }
        .tab-btn:hover { border-color: #fdba74; color: var(--orange-dark); }
        .tab-btn.active {
            background: var(--orange-dark);
            border-color: var(--orange-dark);
            color: #fff;
            box-shadow: 0 4px 12px rgba(211, 84, 0, 0.25);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .section-title {
            font-size: var(--fs-md);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--orange-dark);
            margin: 22px 0 12px;
        }
        .section-title:first-child { margin-top: 0; }

        .session-card {
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 12px;
            margin-bottom: 10px;
            overflow: hidden;
            background: var(--white);
        }
        .session-header {
            padding: 16px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-size: var(--fs-md);
        }
        .session-header:hover { background: var(--gray-100); }
        .session-header .chevron { font-size: var(--fs-lg); color: var(--gray-500); }
        .session-title { font-weight: 700; font-size: var(--fs-md); color: var(--gray-900); }
        .session-meta { font-size: var(--fs-sm); color: var(--gray-700); margin-top: 4px; font-weight: 500; }
        .session-body { padding: 16px 18px; display: none; border-top: 1px solid rgba(0, 0, 0, 0.06); }
        .group-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .group-card {
            background: var(--gray-100);
            padding: 10px 16px;
            border-radius: 8px;
            font-size: var(--fs-md);
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .group-card:hover { background: var(--orange-pale); color: var(--orange-dark); }
        .btn-text {
            margin-top: 12px;
            background: none;
            border: none;
            color: var(--orange-dark);
            font-weight: 700;
            font-size: var(--fs-md);
            font-family: inherit;
            cursor: pointer;
            padding: 0;
        }
        .btn-text:hover { text-decoration: underline; }
        .empty-state {
            padding: 32px 16px;
            color: var(--gray-500);
            text-align: center;
            font-size: var(--fs-md);
            font-weight: 500;
        }
        .empty-state a { font-size: inherit; }

        .published-layout {
            display: grid;
            grid-template-columns: minmax(260px, 300px) 1fr;
            gap: 16px;
            align-items: start;
        }
        @media (max-width: 800px) { .published-layout { grid-template-columns: 1fr; } }
        .session-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 480px;
            overflow-y: auto;
        }
        .session-row {
            padding: 14px 16px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 10px;
            cursor: pointer;
            background: var(--white);
            transition: border-color 0.15s, background 0.15s;
        }
        .session-row:hover { border-color: rgba(230, 126, 34, 0.35); }
        .session-row.active { border-color: var(--orange); background: #fffaf5; }
        .session-row-id { font-weight: 700; font-size: var(--fs-md); color: var(--gray-900); }
        .session-row-meta { font-size: var(--fs-sm); color: var(--gray-700); margin-top: 4px; font-weight: 500; }
        .badge-open, .badge-closed {
            float: right;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: var(--fs-sm);
            font-weight: 700;
        }
        .badge-open { background: #d1fae5; color: #065f46; }
        .badge-closed { background: #f3f4f6; color: #6b7280; }

        .detail-panel {
            border-radius: 12px;
            padding: 20px;
            background: var(--gray-100);
            min-height: 180px;
            border: 1px solid rgba(0, 0, 0, 0.06);
        }
        .detail-panel.empty {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-500);
            font-size: var(--fs-md);
            font-weight: 500;
        }
        .detail-header { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
        .detail-title { font-size: var(--fs-lg); font-weight: 800; color: var(--gray-900); }
        .detail-subtitle { font-size: var(--fs-sm); color: var(--gray-700); margin-top: 6px; font-weight: 500; }
        .detail-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-modify, .btn-action {
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 700;
            font-size: var(--fs-md);
            font-family: inherit;
            cursor: pointer;
            border: none;
        }
        .btn-modify { background: var(--white); color: var(--gray-900); border: 1px solid rgba(0, 0, 0, 0.12); }
        .btn-primary { background: var(--orange); color: white; }
        .btn-danger { background: var(--white); color: #b42318; border: 1px solid #fecaca; }
        .param-section-title {
            font-size: var(--fs-sm);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--gray-500);
            margin: 18px 0 10px;
        }
        .form-group { margin-bottom: 12px; }
        .form-group label {
            display: block;
            font-weight: 700;
            font-size: var(--fs-md);
            margin-bottom: 6px;
            color: var(--gray-900);
        }
        /* Form fields: see /static/theme.css (white inputs + selects) */
        .form-group textarea.mono {
            font-family: ui-monospace, monospace;
            font-size: var(--fs-sm);
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: stretch; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: stretch; }
        @media (max-width: 700px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }
        .rooms-table {
            width: 100%;
            border-collapse: collapse;
            font-size: var(--fs-md);
            margin-bottom: 20px;
        }
        .rooms-table th {
            text-align: left;
            padding: 12px;
            font-size: var(--fs-sm);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--gray-500);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }
        .rooms-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            font-size: var(--fs-md);
            font-weight: 500;
        }
        .badge-bot {
            background: var(--gray-100);
            color: var(--gray-700);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: var(--fs-sm);
            font-weight: 600;
            margin-right: 4px;
        }
        .btn-row {
            border: none;
            background: var(--gray-100);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: var(--fs-sm);
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            margin-right: 4px;
        }
        .btn-row:hover { background: var(--gray-300); }
        .btn-row.danger { color: #b42318; background: #fef2f2; }

        .chat-monitor-layout {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 12px;
            height: 420px;
        }
        @media (max-width: 700px) { .chat-monitor-layout { grid-template-columns: 1fr; height: auto; } }
        .sidebar {
            background: var(--gray-100);
            border-radius: 12px;
            overflow-y: auto;
            padding: 8px;
            border: 1px solid rgba(0, 0, 0, 0.06);
        }
        .room-item {
            padding: 12px 14px;
            margin-bottom: 4px;
            border-radius: 8px;
            background: var(--white);
            cursor: pointer;
            font-size: var(--fs-md);
            border: 1px solid transparent;
        }
        .room-item:hover { border-color: rgba(0, 0, 0, 0.08); }
        .room-item.active { background: var(--orange); color: white; }
        .room-item.active .text-sm { color: rgba(255,255,255,0.85); }
        .room-item b { font-size: var(--fs-md); font-weight: 700; }
        .viewer {
            background: var(--white);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            padding: 16px;
            border: 1px solid rgba(0, 0, 0, 0.06);
        }
        .viewer h3 {
            font-size: var(--fs-md);
            font-weight: 700;
            color: var(--gray-900);
        }
        .messages-list {
            flex: 1;
            overflow-y: auto;
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .msg-bubble {
            background: var(--gray-100);
            padding: 12px 14px;
            border-radius: 12px;
            max-width: 90%;
            font-size: var(--fs-md);
            line-height: 1.45;
        }
        .msg-bubble b {
            display: block;
            font-size: var(--fs-sm);
            font-weight: 700;
            color: var(--gray-500);
            margin-bottom: 6px;
        }
        .msg-bubble.bot-msg { border-left: 3px solid var(--orange); }

        .export-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 12px;
        }
        .export-card {
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 12px;
            padding: 16px;
            background: var(--white);
        }
        .export-card strong {
            font-size: var(--fs-md);
            font-weight: 700;
            color: var(--gray-900);
        }
        .export-card .text-sm { margin-top: 4px; }
        .btn-export {
            display: inline-block;
            margin-top: 12px;
            padding: 10px 16px;
            border-radius: 8px;
            background: var(--gray-900);
            color: white;
            font-weight: 700;
            font-size: var(--fs-md);
            font-family: inherit;
            text-decoration: none;
        }
        .btn-export:hover { opacity: 0.9; }

        .notify {
            position: fixed;
            top: calc(var(--header-height) + 8px);
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 20px;
            border-radius: 10px;
            background: var(--gray-900);
            color: white;
            font-weight: 700;
            font-size: var(--fs-md);
            font-family: inherit;
            display: none;
            z-index: 2000;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body class="has-top-nav">

<header class="nav-header">
    <a href="/" class="nav-logo">ACTR</a>
    <nav class="nav-links">
        <a href="/" class="active">Dashboard</a>
        <a href="/admin">Admin</a>
        <a href="/manual">Manual</a>
    </nav>
</header>

<div id="notification" class="notify"></div>

<div class="main-content">
    <div class="page-wrap dashboard">

        <div class="page-hero">
            <h1 class="page-title">Dashboard</h1>
        </div>

        <div class="metrics">
            <div class="metric"><label>Active rooms</label><span id="total-rooms">0</span></div>
            <div class="metric"><label>In queue</label><span id="waiting-count">0</span></div>
            <div class="metric"><label>Sessions</label><span id="session-count">0</span></div>
            <div class="metric" title="On if at least one published session has AI bots enabled in Admin (Enable AI Bots = Yes). Off if no sessions or all are human-only.">
                <label>AI bots</label><span id="bot-status">—</span>
            </div>
        </div>

        <div class="card">
            <div class="tabs" role="tablist">
                <button type="button" class="tab-btn active" id="btn-sessions" onclick="switchTab('sessions')">Sessions</button>
                <button type="button" class="tab-btn" id="btn-rooms" onclick="switchTab('rooms')">Monitor</button>
                <button type="button" class="tab-btn" id="btn-export" onclick="switchTab('export')">Export</button>
            </div>

            <div id="sessions-tab" class="tab-content active">
                <p class="section-title">Join</p>
                <div id="session-list"><div class="empty-state">Loading…</div></div>

                <p class="section-title">Published sessions</p>
                <div class="published-layout">
                    <div id="publishedSessionList" class="session-list">
                        <p class="empty-state" style="padding:16px;">Loading…</p>
                    </div>
                    <div id="session-detail-panel" class="detail-panel empty">
                        Select a session
                    </div>
                </div>
            </div>

            <div id="rooms-tab" class="tab-content">
                <p class="section-title">Live rooms</p>
                <table class="rooms-table">
                    <thead>
                        <tr>
                            <th>Room</th><th>Session</th><th>People</th><th>Bots</th><th>Msgs</th><th></th>
                        </tr>
                    </thead>
                    <tbody id="rooms-body"></tbody>
                </table>
                <div class="chat-monitor-layout">
                    <div class="sidebar" id="sidebar-list"></div>
                    <div class="viewer">
                        <h3 id="current-room-name">Select a room</h3>
                        <div class="messages-list" id="monitor-messages"></div>
                    </div>
                </div>
            </div>

            <div id="export-tab" class="tab-content">
                <p class="section-title">Activity logs</p>
                <div class="export-grid" id="export-sessions-list"><p class="empty-state">Loading…</p></div>
                <p class="section-title">Chat history</p>
                <div class="export-grid" id="export-rooms-list"><p class="empty-state">Loading…</p></div>
            </div>
        </div>
    </div>
</div>

<script>
const uid = 'user_' + Math.floor(Math.random() * 100000);

let selectedRoomId = null;
let allRoomsCache = [];
let allSessionsCache = [];
let selectedSessionId = null;
let detailSnapshot = null;

function toast(msg) {
    const el = document.getElementById('notification');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 3200);
}

function isAdminLoggedIn() {
    return document.cookie.includes('actr_auth=authenticated');
}

function switchTab(t) {
    if (t === 'join' || t === 'published' || t === 'monitor') t = t === 'monitor' ? 'rooms' : 'sessions';
    if (!['sessions', 'rooms', 'export'].includes(t)) t = 'sessions';
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    const tabEl = document.getElementById(t + '-tab');
    const btnEl = document.getElementById('btn-' + t);
    if (tabEl) tabEl.classList.add('active');
    if (btnEl) btnEl.classList.add('active');
    if (t === 'export') renderExportTab();
    if (t === 'sessions') loadPublishedSessions();
    history.replaceState(null, '', t === 'sessions' ? '/' : `/?tab=${t}`);
}

function toggleSession(id) {
    const el = document.getElementById('body-' + id);
    if (el) el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

function joinGroup(sessionId, groupId) {
    window.location.href = `/chat/${encodeURIComponent(sessionId)}/${encodeURIComponent(groupId)}?uid=${encodeURIComponent(uid)}`;
}

function goToWait(sessionId) {
    window.location.href = `/wait?uid=${encodeURIComponent(uid)}&session_id=${encodeURIComponent(sessionId)}`;
}

function renderLobbySessions(sessions) {
    const listEl = document.getElementById('session-list');
    if (!sessions.length) {
        listEl.innerHTML = '<div class="empty-state">No sessions yet. <a href="/admin">Create one in Admin</a>.</div>';
        return;
    }
    listEl.innerHTML = sessions.map(s => `
        <div class="session-card">
            <div class="session-header" onclick="toggleSession('${s.id}')">
                <div>
                    <div class="session-title">${s.name || s.id}</div>
                    <div class="session-meta">${s.group_size} per group · ${s.groups.length} active · ${s.id}</div>
                </div>
                <span class="chevron" aria-hidden="true">›</span>
            </div>
            <div class="session-body" id="body-${s.id}">
                ${s.groups.length ? `
                    <div class="group-grid">${s.groups.map(g => `
                        <div class="group-card" onclick="joinGroup('${s.id}','${g}')">${g}</div>
                    `).join('')}</div>
                ` : '<p class="text-sm text-muted">No active groups.</p>'}
                <button type="button" class="btn-text" onclick="goToWait('${s.id}')">Join matching queue</button>
            </div>
        </div>
    `).join('');
}

async function loadPublishedSessions() {
    const list = document.getElementById('publishedSessionList');
    try {
        const res = await fetch('/api/sessions');
        const data = await res.json();
        const sessions = data.sessions || [];
        if (!sessions.length) {
            list.innerHTML = '<p class="empty-state">No sessions yet.</p>';
            return;
        }
        list.innerHTML = sessions.map(s => `
            <div class="session-row ${s.id === selectedSessionId ? 'active' : ''}" data-id="${s.id}" onclick="selectSession('${s.id}')">
                <span class="${s.is_open ? 'badge-open' : 'badge-closed'}">${s.is_open ? 'Open' : 'Closed'}</span>
                <div class="session-row-id">${s.name || 'Unnamed'}</div>
                <div class="session-row-meta">${s.id} · ${s.group_size}/group</div>
            </div>
        `).join('');
    } catch (e) {
        list.innerHTML = '<p class="empty-state">Could not load sessions.</p>';
    }
}

async function selectSession(sessionId) {
    selectedSessionId = sessionId;
    document.querySelectorAll('.session-row').forEach(el => {
        el.classList.toggle('active', el.dataset.id === sessionId);
    });
    const panel = document.getElementById('session-detail-panel');
    panel.classList.remove('empty');
    try {
        const res = await fetch(`/api/sessions/${encodeURIComponent(sessionId)}/admin`);
        if (!res.ok) throw new Error('Not found');
        const cfg = await res.json();
        detailSnapshot = JSON.parse(JSON.stringify(cfg));
        const status = cfg.is_open ? 'Open' : 'Closed';
        const displayName = cfg.name || cfg.session_id;
        const condOn = cfg.condition_enabled !== false;
        const assignmentOptions = condOn
            ? `<option value="stratified">Stratified</option>`
            : `<option value="fifo">FIFO</option><option value="stratified">Stratified</option>`;
        panel.innerHTML = `
            <div class="detail-header">
                <div>
                    <h3 class="detail-title">${displayName}</h3>
                    <p class="detail-subtitle">${cfg.session_id} · ${status}</p>
                </div>
                <div class="detail-actions">
                    <button type="button" class="btn-modify" id="btnUnlockModify">Edit</button>
                    <button type="button" class="btn-action btn-primary" id="btnConfirmModify" style="display:none;">Save</button>
                    <button type="button" class="btn-action btn-danger" id="btnCancelModify" style="display:none;">Cancel</button>
                    ${isAdminLoggedIn() ? `<button type="button" class="btn-action btn-danger" id="btnDeleteSession">Delete</button>` : ''}
                </div>
            </div>
            <form id="sessionDetailForm" class="readonly">
                <div class="param-section-title">Basic</div>
                <div class="grid-2">
                    <div class="form-group"><label>Name</label><input type="text" id="modSessionName" disabled></div>
                    <div class="form-group"><label>Group size</label><input type="number" id="modGroupSize" min="1" max="20" disabled></div>
                </div>
                <div class="param-section-title">Timing</div>
                <div class="grid-2">
                    <div class="form-group"><label>Survey open (days)</label><input type="number" id="modSurveyOpenDays" min="1" max="90" disabled></div>
                    <div class="form-group"><label>Chat duration (min)</label><input type="number" id="modGroupChatDuration" min="1" max="180" disabled></div>
                </div>
                <div class="param-section-title">Experiment</div>
                <div class="grid-3">
                    <div class="form-group"><label>Session mode</label><select id="modSessionMode" disabled><option value="1">1 — all bots</option><option value="2">2 — one per msg</option><option value="3">3 — @mention</option></select></div>
                    <div class="form-group"><label>Bots</label><select id="modBotEnabled" disabled><option value="true">On</option><option value="false">Off</option></select></div>
                    <div class="form-group"><label>Assignment</label><select id="modAssignmentMode" disabled>${assignmentOptions}</select></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>Condition</label><select id="modConditionEnabled" disabled><option value="true">On</option><option value="false">Off</option></select></div>
                    <div class="form-group"><label>Qualtrics</label><select id="modQualtricsIntegration" disabled><option value="false">Off</option><option value="true">On</option></select></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>Reply on any msg</label><select id="modBotReplyOnAny" disabled><option value="false">Off</option><option value="true">On</option></select></div>
                    <div class="form-group"><label>Chain depth</label><input type="number" id="modMaxChainDepth" min="1" max="10" disabled></div>
                </div>
                <div class="form-group"><label>Personas (JSON)</label><textarea id="modBotsJson" rows="5" disabled class="mono"></textarea></div>
            </form>
        `;
        fillSessionDetailForm(cfg);
        setDetailEditMode(false);
        document.getElementById('btnUnlockModify').onclick = () => setDetailEditMode(true);
        document.getElementById('btnCancelModify').onclick = () => {
            if (detailSnapshot) fillSessionDetailForm(detailSnapshot);
            setDetailEditMode(false);
        };
        document.getElementById('btnConfirmModify').onclick = confirmModifySession;
        const delBtn = document.getElementById('btnDeleteSession');
        if (delBtn) delBtn.onclick = () => deleteSessionAdmin(sessionId);
    } catch (e) {
        panel.innerHTML = `<p class="empty-state">Could not load: ${e.message}</p>`;
    }
}

function fillSessionDetailForm(cfg) {
    document.getElementById('modSessionName').value = cfg.name || '';
    document.getElementById('modGroupSize').value = cfg.group_size;
    document.getElementById('modSurveyOpenDays').value = cfg.survey_open_days ?? 7;
    document.getElementById('modGroupChatDuration').value = cfg.group_chat_duration_minutes ?? 5;
    document.getElementById('modSessionMode').value = String(cfg.session_mode ?? 1);
    document.getElementById('modBotEnabled').value = cfg.bot_enabled ? 'true' : 'false';
    const condOn = cfg.condition_enabled !== false;
    document.getElementById('modConditionEnabled').value = condOn ? 'true' : 'false';
    // When Condition is On, assignment is forced to stratified.
    document.getElementById('modAssignmentMode').value = condOn ? 'stratified' : (cfg.assignment_mode || 'fifo');
    const qOn = cfg.qualtrics_handoff_enabled && cfg.qualtrics_store_chat;
    document.getElementById('modQualtricsIntegration').value = qOn ? 'true' : 'false';
    document.getElementById('modBotsJson').value = JSON.stringify(cfg.bots || [], null, 2);
    const setIf = (id, val, fallback) => {
        const el = document.getElementById(id);
        if (el) el.value = val ?? fallback;
    };
    setIf('modBotReplyOnAny', cfg.bot_reply_on_any_message === true ? 'true' : 'false', 'true');
    setIf('modMaxChainDepth', cfg.max_chain_depth, 3);
}

function setDetailEditMode(editing) {
    const form = document.getElementById('sessionDetailForm');
    if (!form) return;
    form.classList.toggle('readonly', !editing);
    form.querySelectorAll('input, select, textarea').forEach(el => { el.disabled = !editing; });
    document.getElementById('btnUnlockModify').style.display = editing ? 'none' : 'inline-block';
    document.getElementById('btnConfirmModify').style.display = editing ? 'inline-block' : 'none';
    document.getElementById('btnCancelModify').style.display = editing ? 'inline-block' : 'none';
}

async function confirmModifySession() {
    if (!selectedSessionId) return;
    let payload;
    try {
        const bots = JSON.parse(document.getElementById('modBotsJson').value || '[]');
        payload = {
            session_name: document.getElementById('modSessionName').value,
            group_size: parseInt(document.getElementById('modGroupSize').value, 10),
            survey_open_days: parseInt(document.getElementById('modSurveyOpenDays').value, 10),
            group_chat_duration_minutes: parseInt(document.getElementById('modGroupChatDuration').value, 10),
            session_mode: parseInt(document.getElementById('modSessionMode').value, 10),
            bot_enabled: document.getElementById('modBotEnabled').value === 'true',
            assignment_mode: document.getElementById('modAssignmentMode').value,
            condition_enabled: document.getElementById('modConditionEnabled').value === 'true',
            qualtrics_handoff_enabled: document.getElementById('modQualtricsIntegration').value === 'true',
            qualtrics_store_chat: document.getElementById('modQualtricsIntegration').value === 'true',
            bot_reply_on_any_message: document.getElementById('modBotReplyOnAny').value === 'true',
            max_chain_depth: parseInt(document.getElementById('modMaxChainDepth').value, 10),
            bots
        };
    } catch (e) {
        toast('Invalid personas JSON');
        return;
    }
    try {
        const res = await fetch(`/api/sessions/${encodeURIComponent(selectedSessionId)}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.status === 'success') {
            toast('Saved');
            setDetailEditMode(false);
            await updateData();
            await selectSession(selectedSessionId);
        } else {
            toast('Save failed');
        }
    } catch (e) {
        toast('Network error');
    }
}

async function deleteSessionAdmin(sessionId) {
    if (!confirm(`Delete session ${sessionId}?`)) return;
    const res = await fetch(`/api/admin/sessions/${encodeURIComponent(sessionId)}`, { method: 'DELETE' });
    const data = await res.json();
    if (data.status === 'success') {
        toast('Deleted');
        selectedSessionId = null;
        const panel = document.getElementById('session-detail-panel');
        panel.classList.add('empty');
        panel.innerHTML = 'Select a session';
        updateData();
    } else {
        toast('Delete failed');
    }
}

async function updateData() {
    try {
        const [roomsRes, configRes, sessionsRes] = await Promise.all([
            fetch('/api/admin/rooms'),
            fetch('/api/admin/config'),
            fetch('/api/sessions')
        ]);
        const data = await roomsRes.json();
        const config = await configRes.json();
        const sessData = await sessionsRes.json();

        allRoomsCache = data.rooms || [];
        allSessionsCache = sessData.sessions || [];

        document.getElementById('total-rooms').textContent = allRoomsCache.length;
        document.getElementById('waiting-count').textContent = data.waiting_count || 0;
        document.getElementById('session-count').textContent = allSessionsCache.length;
        const botEl = document.getElementById('bot-status');
        if (botEl) {
            const on = !!data.bot_enabled;
            botEl.textContent = on ? 'On' : 'Off';
            botEl.style.color = on ? 'var(--success)' : 'var(--gray-500)';
        }

        renderLobbySessions(allSessionsCache);

        const botNames = (config.bots || []).map(b => b.name);
        document.getElementById('rooms-body').innerHTML = allRoomsCache.map(r => {
            const botsInRoom = r.participants.filter(p => botNames.includes(p));
            const humans = r.participants.length - botsInRoom.length;
            return `<tr>
                <td><strong>${r.id}</strong></td>
                <td>${r.session_name || r.session_id}</td>
                <td>${humans}</td>
                <td>${botsInRoom.map(b => `<span class="badge-bot">${b}</span>`).join('') || '—'}</td>
                <td>${r.message_count}</td>
                <td>
                    <button type="button" class="btn-row" onclick="monitorRoom('${r.id}')">Watch</button>
                    <button type="button" class="btn-row danger" onclick="deleteRoom('${r.id}')">Delete</button>
                </td>
            </tr>`;
        }).join('') || '<tr><td colspan="6" class="empty-state">No active rooms</td></tr>';

        document.getElementById('sidebar-list').innerHTML = allRoomsCache.map(r => `
            <div class="room-item ${selectedRoomId === r.id ? 'active' : ''}" onclick="selectRoom('${r.id}')">
                <b>${r.id}</b><br><span class="text-sm">${r.message_count} messages</span>
            </div>
        `).join('') || '<p class="empty-state" style="padding:12px;">No rooms</p>';

        if (selectedRoomId) fetchMessages(selectedRoomId);
        if (document.getElementById('sessions-tab').classList.contains('active')) {
            loadPublishedSessions();
        }
    } catch (e) { console.error(e); }
}

async function fetchMessages(rid) {
    try {
        const [msgRes, cfgRes] = await Promise.all([
            fetch(`/api/admin/rooms/${rid}/messages`),
            fetch('/api/admin/config')
        ]);
        if (!msgRes.ok) return;
        const data = await msgRes.json();
        const botNames = ((await cfgRes.json()).bots || []).map(b => b.name);
        const container = document.getElementById('monitor-messages');
        container.innerHTML = '';
        (data.messages || []).forEach(m => {
            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble' + (botNames.includes(m.sender) ? ' bot-msg' : '');
            bubble.innerHTML = `<b>${m.sender}</b>${m.text}`;
            container.appendChild(bubble);
        });
        container.scrollTop = container.scrollHeight;
    } catch (e) { console.error(e); }
}

function monitorRoom(id) { switchTab('rooms'); selectRoom(id); }
function selectRoom(id) {
    selectedRoomId = id;
    document.getElementById('current-room-name').textContent = id;
    fetchMessages(id);
    updateData();
}

async function deleteRoom(id) {
    if (!confirm(`Delete room ${id}?`)) return;
    const res = await fetch(`/api/admin/rooms/${id}`, { method: 'DELETE' });
    if ((await res.json()).status === 'success') {
        if (selectedRoomId === id) selectedRoomId = null;
        updateData();
    }
}

function renderExportTab() {
    document.getElementById('export-sessions-list').innerHTML = allSessionsCache.length ? allSessionsCache.map(s => `
        <div class="export-card">
            <strong>${s.name || s.id}</strong>
            <div class="text-sm">${s.id}</div>
            <a href="/api/export/session/${encodeURIComponent(s.id)}/activity" download class="btn-export">Download CSV</a>
        </div>
    `).join('') : '<p class="empty-state">No sessions</p>';

    document.getElementById('export-rooms-list').innerHTML = allRoomsCache.length ? allRoomsCache.map(r => `
        <div class="export-card">
            <strong>${r.id}</strong>
            <div class="text-sm">${r.message_count} messages</div>
            <a href="/api/export/room/${encodeURIComponent(r.id)}/messages" download class="btn-export">Download CSV</a>
        </div>
    `).join('') : '<p class="empty-state">No rooms yet</p>';
}

(function init() {
    const params = new URLSearchParams(location.search);
    let tab = params.get('tab') || 'sessions';
    if (tab === 'sandbox' || tab === 'monitor') tab = tab === 'sandbox' ? 'sessions' : 'rooms';
    switchTab(tab);
    const session = params.get('session');
    if (session && tab === 'sessions') {
        setTimeout(() => selectSession(session), 500);
    }
    updateData();
    setInterval(updateData, 4000);
})();
</script>
</body>
